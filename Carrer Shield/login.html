<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Career Shield</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .tab-btns {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: var(--background-color);
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            font-weight: 600;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .alert {
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            text-align: center;
        }

        .alert-error {
            background: #ffe5e9;
            color: #c0392b;
        }

        .alert-success {
            background: #e5f9f6;
            color: #00897b;
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">Career Shield</div>
                <div class="mobile-menu-btn">
                    <button class="icon-btn" id="menu-btn">☰</button>
                </div>
                <div class="nav-links" id="nav-links">
                    <a href="index.html">Home</a>
                    <a href="about.html">About Us</a>
                    <a href="services.html">Services</a>
                    <a href="contact.html">Contact</a>
                </div>
                <div class="controls">
                    <button class="icon-btn" id="rtl-toggle" title="Toggle RTL">RTL</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="card" style="width: 100%; max-width: 420px; padding: 2rem;">
            <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--primary-color);">Welcome to Career Shield
            </h2>

            <div class="tab-btns">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Tab -->
            <div id="login-tab" class="tab-content active">
                <div id="login-alert"></div>
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn" id="login-btn" style="width: 100%;">Login</button>
                </form>
            </div>

            <!-- Register Tab -->
            <div id="register-tab" class="tab-content">
                <div id="register-alert"></div>
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="Min 6 characters" required>
                    </div>
                    <button type="submit" class="btn" id="register-btn" style="width: 100%;">Create Account</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Career Shield. All rights reserved.</p>
        </div>
    </footer>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        function showAlert(id, msg, type) {
            const el = document.getElementById(id);
            el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.textContent = 'Logging in...';
            btn.disabled = true;

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.message);

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAlert('login-alert', '✅ Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'user-dashboard.html', 1000);
            } catch (err) {
                showAlert('login-alert', '❌ ' + err.message, 'error');
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            btn.textContent = 'Creating Account...';
            btn.disabled = true;

            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.message);

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAlert('register-alert', '✅ Account created! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'user-dashboard.html', 1000);
            } catch (err) {
                showAlert('register-alert', '❌ ' + err.message, 'error');
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        }
    </script>
    <script src="main.js"></script>
    <script src="rtltoggle.js"></script>
</body>

</html>
